name: Bug report
description: Report a bug or unexpected behavior in gitpo.st
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

        **Note:** If this is a security vulnerability, please use the [private security reporting](https://github.com/djburkhart/gitpo.st/security/advisories/new) instead.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Tell us what you see that shouldn't be happening...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `terraform apply` with ...
        2. Push to Gogs repo ...
        3. See error in ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - gitpo.st version / commit: (e.g. main @ abc1234)
        - Terraform version:
        - Kubernetes / GKE version:
        - Gogs version (if customized):
        - GoCD version (if customized):
        - Browser / OS (if UI-related):
      value: |
        - gitpo.st: 
        - Terraform: 
        - GKE: 
        - Gogs: 
        - GoCD: 
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context, logs, screenshots, or links here.

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/djburkhart/gitpo.st/blob/main/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
