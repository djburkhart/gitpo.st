name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Go (hub service) ---
  go:
    name: Go / hub
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: hub/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - name: Vet
        run: go vet ./...

  # --- Terraform ---
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive terraform/
        continue-on-error: true

      - name: Terraform Init (dev)
        run: terraform -chdir=terraform/environments/dev init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=terraform/environments/dev validate

      - name: Show fmt errors
        if: steps.fmt.outcome == 'failure'
        run: terraform fmt -recursive -diff terraform/

  # --- Docker build test (hub) ---
  docker-hub:
    name: Docker (hub)
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (hub)
        uses: docker/build-push-action@v6
        with:
          context: ./docker/hub
          push: false
          tags: gitpo.st/hub:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Basic file & documentation checks ---
  docs:
    name: Documentation & Linting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for common issues
        run: |
          # Ensure no obvious secrets slipped in (basic grep)
          if grep -rE "(AKIA|ghp_|AIza|-----BEGIN (RSA|EC) PRIVATE KEY)" --include="*.tf" --include="*.yaml" --include="*.yml" --include="*.go" . ; then
            echo "Possible secret found!"
            exit 1
          fi
          echo "No obvious secrets found in key file types."

      - name: Markdown lint (basic)
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
            !CODE_OF_CONDUCT.md
            !LICENSE
